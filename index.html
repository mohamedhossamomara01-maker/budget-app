<title>ميزانية محمد</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070c16;font-family:'Cairo',sans-serif;direction:rtl;overscroll-behavior:none;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1a2840;border-radius:99px;}
</style>

<div id="root"></div>







<script>
// React loader with CDN fallback
(function(){
  var cdns = [
    ["https://unpkg.com/react@18.2.0/umd/react.production.min.js",
     "https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js",
     "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"],
    ["https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js",
     "https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js",
     "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"],
    ["https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
     "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
     "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"]
  ];
  function loadScript(src, cb, err) {
    var s = document.createElement("script");
    s.src = src; s.onload = cb; s.onerror = err;
    document.head.appendChild(s);
  }
  function loadGroup(group, idx, cb) {
    if (idx >= group.length) { cb(true); return; }
    loadScript(group[idx], function(){ loadGroup(group, idx+1, cb); }, function(){ cb(false); });
  }
  function tryNextCDN(cdnIdx) {
    if (cdnIdx >= cdns.length) {
      document.body.innerHTML = "<div style=\"color:red;padding:20px;font-family:sans-serif\">⚠️ فشل تحميل التطبيق. تأكد من اتصالك بالإنترنت.</div>";
      return;
    }
    loadGroup(cdns[cdnIdx], 0, function(ok){
      if (ok) { loadScript("/app.js", null, null); }
      else { tryNextCDN(cdnIdx + 1); }
    });
  }
  tryNextCDN(0);
})();
</script>
